<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="MAcyEP6Orc6uN_v1QCNc2k1dZ2gWkMQ4d3Z94s_k_dA" />
  <title>Coming Soon - AI Event Collection</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      text-align: center;
      cursor: pointer;
      position: relative;
    }
    /* Background grid effect matching the site */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
      opacity: 0.5;
    }
    
    .content-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .coming-soon-text {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: 3px;
      margin-bottom: 2rem;
      background: linear-gradient(135deg, #eee 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
      animation: gentle-pulse 3s infinite alternate ease-in-out;
    }

    .coming-soon-image {
      max-width: 80%;
      max-height: 50vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
      border: none;
    }

    .click-hint {
      margin-top: 2rem;
      color: #888;
      font-size: 0.95rem;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    body:hover .click-hint {
      opacity: 1;
    }

    @keyframes gentle-pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.02); }
    }

    @media (max-width: 768px) {
      .coming-soon-text {
        font-size: 3.5rem;
      }
      .coming-soon-image {
        max-width: 95%;
      }
    }
  </style>
</head>
<body onclick="window.location.href='index.html';">
  <div class="content-wrapper">
    <div class="coming-soon-text">Coming Soon</div>
    <img src="image/Character/ComingSoon_gomennasai.jpg" alt="ごめんなさい！" class="coming-soon-image">
    <p class="click-hint">※画面をタップ・クリックするとトップページに戻ります</p>
  </div>
</body>
</html>

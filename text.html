<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>AI Event - Live Experience</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Layer 1: YouTube (背面) */
    #player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }

    /* Layer 2: Firework Canvas (中間) */
    #firework-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* Layer 3: UI & Comments (前面) */
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    .floating-comment {
      position: absolute;
      color: white;
      font-weight: bold;
      font-size: 24px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      white-space: nowrap;
      animation: floatUp 4s forwards linear;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* コメント入力（テスト用） */
    #input-area {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      z-index: 30;
      display: flex;
      gap: 10px;
    }

    input {
      padding: 10px;
      border-radius: 5px;
      border: none;
      width: 300px;
    }

    button {
      padding: 10px 20px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="container">
    <div id="player"></div>

    <canvas id="firework-canvas"></canvas>

    <div id="ui-layer"></div>

    <div id="input-area">
      <input type="text" id="comment-input" placeholder="コメントを入力（例：たまやー！）">
      <button onclick="sendComment()">送信</button>
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: 'YOUR_VIDEO_ID', // ここにYouTubeプレミア公開のIDを入れる
        playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'showinfo': 0 },
        events: { 'onReady': onPlayerReady }
      });
    }

    function onPlayerReady(event) {
      // 自動再生（ミュートが必要な場合あり）
      event.target.playVideo();
    }

    // コメント送信・演出実行
    function sendComment() {
      const input = document.getElementById('comment-input');
      const text = input.value;
      if (!text) return;

      // 1. 文字を浮かび上がらせる
      createFloatingComment(text);

      // 2. 花火を打ち上げる
      launchFirework();

      input.value = '';
    }

    function createFloatingComment(text) {
      const el = document.createElement('div');
      el.className = 'floating-comment';
      el.innerText = text;
      el.style.left = Math.random() * 70 + 15 + '%'; // ランダムな位置から
      document.getElementById('ui-layer').appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    // --- 花火の簡易描画エンジン ---
    const canvas = document.getElementById('firework-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    function launchFirework() {
      const x = Math.random() * canvas.width;
      const y = canvas.height * 0.3; // 画面上部で爆発
      const color = `hsl(${Math.random() * 360}, 100%, 50%)`;
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: x, y: y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10,
          life: 1.0,
          color: color
        });
      }
    }

    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; // 重力
        p.life -= 0.02;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(update);
    }
    update();
  </script>
</body>

</html>

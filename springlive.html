<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spring FES - Test Mode</title>
  <script src="https://api.ai-event-collection.jp/socket.io/socket.io.js"></script>
  <style>
    :root {
      --pink: #ff7eb3;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 25px;
      background: #1a1a1a;
      border-bottom: 1px solid var(--glass);
    }

    .logo {
      font-weight: bold;
      color: var(--pink);
    }

    main {
      flex: 1;
      display: flex;
      padding: 15px;
      gap: 15px;
      overflow: hidden;
    }

    #video-section {
      flex: 3;
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #firework-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    #comment-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    #sidebar {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: rgba(20, 20, 20, 0.8);
      border-radius: 16px;
      border: 1px solid var(--glass);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 15px;
      background: var(--glass);
      color: var(--pink);
      font-weight: bold;
    }

    #log-list {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
    }

    .log-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid var(--pink);
    }

    .log-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    footer {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .input-group {
      display: flex;
      gap: 10px;
      width: 80%;
      max-width: 600px;
    }

    input {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass);
      color: white;
      padding: 10px;
      border-radius: 20px;
      outline: none;
    }

    button {
      background: var(--pink);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .floating-comment {
      position: absolute;
      color: #fff;
      font-weight: bold;
      font-size: 2vw;
      text-shadow: 0 0 10px var(--pink);
      white-space: nowrap;
      animation: floatUp 5s forwards linear;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(110vh);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🌸 AI Spring FES - TEST MODE</div>
  </header>
  <main>
    <div id="video-section">
      <div id="player"></div>
      <canvas id="firework-canvas"></canvas>
      <div id="comment-layer"></div>
    </div>
    <div id="sidebar">
      <div class="sidebar-header">LIVE CHAT</div>
      <div id="log-list"></div>
    </div>
  </main>
  <footer>
    <div class="input-group">
      <input type="text" id="comment-input" placeholder="テスト入力をどうぞ！" maxlength="40">
      <button id="send-btn">送信 🚀</button>
    </div>
  </footer>

  <script>
    // テスト動画ID
    const TEST_VIDEO = 'dQw4w9WgXcQ';

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('player', {
        videoId: TEST_VIDEO,
        playerVars: { 'autoplay': 1, 'controls': 1, 'origin': window.location.origin },
        events: { 'onReady': (event) => event.target.playVideo() }
      });
    }

    const socket = io('https://api.ai-event-collection.jp');

    // 履歴の読み込み
    socket.on('load-history', (history) => {
      const list = document.getElementById('log-list');
      list.innerHTML = '';
      history.forEach(data => addLogItem(data));
    });

    // 新規コメント受信
    socket.on('new-comment', (data) => {
      createFloatingComment(data.text);
      addLogItem(data);
      launchFirework();
      setTimeout(launchFirework, 400);
      setTimeout(launchFirework, 800);
    });

    function emitComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (text) {
        socket.emit('send-comment', { text: text });
        input.value = '';
      }
    }
    document.getElementById('send-btn').onclick = emitComment;
    document.getElementById('comment-input').onkeypress = (e) => { if (e.key === 'Enter') emitComment(); };

    function addLogItem(data) {
      const list = document.getElementById('log-list');
      const item = document.createElement('div');
      item.className = 'log-item';
      const timeStr = data.time || "00:00";
      const shortId = data.user ? data.user.substring(0, 4) : "User";
      item.innerHTML = `<div class="log-meta"><span>ID: ${shortId}</span><span>${timeStr}</span></div><div>${data.text}</div>`;
      list.prepend(item);
    }

    function createFloatingComment(text) {
      const el = document.createElement('div');
      el.className = 'floating-comment';
      el.innerText = text;
      el.style.left = (Math.random() * 60 + 20) + '%';
      document.getElementById('comment-layer').appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    const canvas = document.getElementById('firework-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.onresize = resize; resize();

    function launchFirework() {
      const x = Math.random() * canvas.width;
      const y = canvas.height * (Math.random() * 0.4 + 0.2);
      const hue = 330 + Math.random() * 40;
      for (let i = 0; i < 60; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 1.6, color: `hsl(${hue}, 100%, 75%)` });
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.008;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>

</html>

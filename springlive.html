<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spring FES 2026 - Live (Visible Fix)</title>
  <script src="https://api.ai-event-collection.jp/socket.io/socket.io.js"></script>
  <style>
    :root {
      --pink: #ff7eb3;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 25px;
      background: #1a1a1a;
      border-bottom: 1px solid var(--glass);
      flex-shrink: 0;
    }

    .logo {
      font-weight: bold;
      color: var(--pink);
    }

    main {
      flex: 1;
      display: flex;
      padding: 15px;
      gap: 15px;
      overflow: hidden;
    }

    #video-section {
      flex: 3;
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      /* ブラウザに独立した描画層（Layer）として認識させる */
      isolation: isolate;
    }

    #video-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* 動画を最下層に配置 (z-index: 1) */
      z-index: 1;
    }

    /* 花火とコメントの層。z-index を大きく離し、背景を完全に透明化 */
    #firework-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      /* 50まで上げる */
      pointer-events: none;
      background: transparent !important;
    }

    #comment-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      /* 100まで上げる */
      pointer-events: none;
    }

    #sidebar {
      flex: 1;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 16px;
      border: 1px solid var(--glass);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 15px;
      background: var(--glass);
      color: var(--pink);
      font-weight: bold;
    }

    #log-list {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
    }

    .log-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid var(--pink);
      font-size: 14px;
    }

    footer {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      border-top: 1px solid var(--glass);
      flex-shrink: 0;
    }

    .input-group {
      display: flex;
      gap: 12px;
      width: 80%;
      max-width: 700px;
    }

    input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass);
      color: white;
      padding: 10px 15px;
      border-radius: 25px;
      outline: none;
    }

    button {
      background: var(--pink);
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }

    .floating-comment {
      position: absolute;
      color: #fff;
      font-weight: bold;
      font-size: 1.8vw;
      text-shadow: 0 0 10px var(--pink);
      white-space: nowrap;
      animation: floatUp 5s forwards linear;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(110vh);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🌸 AI Spring FES 2026 - Live (Visible Fix)</div>
  </header>
  <main>
    <div id="video-section">
      <iframe id="video-frame"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&controls=1&enablejsapi=1&origin=https://ryomaeno84.github.io"
        allow="autoplay; encrypted-media; fullscreen" allowfullscreen>
      </iframe>
      <canvas id="firework-canvas"></canvas>
      <div id="comment-layer"></div>
    </div>
    <div id="sidebar">
      <div class="sidebar-header">LIVE CHAT</div>
      <div id="log-list"></div>
    </div>
  </main>
  <footer>
    <div class="input-group">
      <input type="text" id="comment-input" placeholder="メッセージを入力！" maxlength="40">
      <button id="send-btn">打ち上げる！ 🚀</button>
    </div>
  </footer>

  <script>
    const socket = io('https://api.ai-event-collection.jp');
    socket.on('load-history', (history) => {
      const list = document.getElementById('log-list');
      list.innerHTML = '';
      history.forEach(data => addLogItem(data));
    });
    socket.on('new-comment', (data) => {
      createFloatingComment(data.text);
      addLogItem(data);
      launchFirework();
      setTimeout(launchFirework, 400);
      setTimeout(launchFirework, 800);
    });
    function emitComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (text) { socket.emit('send-comment', { text: text }); input.value = ''; }
    }
    document.getElementById('send-btn').onclick = emitComment;
    document.getElementById('comment-input').onkeypress = (e) => { if (e.key === 'Enter') emitComment(); };
    function addLogItem(data) {
      const list = document.getElementById('log-list');
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML = `<div class="log-meta"><span>ID: ${data.user?.substring(0, 4)}</span><span>${data.time || "00:00"}</span></div><div>${data.text}</div>`;
      list.prepend(item);
    }
    function createFloatingComment(text) {
      const el = document.createElement('div');
      el.className = 'floating-comment';
      el.innerText = text;
      el.style.left = (Math.random() * 60 + 20) + '%';
      document.getElementById('comment-layer').appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }
    const canvas = document.getElementById('firework-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.onresize = resize; resize();
    function launchFirework() {
      const x = Math.random() * canvas.width;
      const y = canvas.height * (Math.random() * 0.4 + 0.2);
      const hue = 330 + Math.random() * 40;
      for (let i = 0; i < 60; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 1.6, color: `hsl(${hue}, 100%, 75%)` });
      }
    }
    function animate() {
      // 透明度を使ってクリアする際、背景が完全に透明であることを保証
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.008;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>

</html>

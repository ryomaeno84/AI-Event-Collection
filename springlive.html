<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spring FES 2026 - Live (History & Video Test)</title>
  <script src="https://api.ai-event-collection.jp/socket.io/socket.io.js"></script>
  <style>
    :root {
      --pink: #ff7eb3;
      --glass: rgba(255, 255, 255, 0.1);
    }

    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 25px;
      background: linear-gradient(90deg, #1a1a1a, #000);
      border-bottom: 1px solid var(--glass);
    }

    .logo {
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: var(--pink);
    }

    main {
      flex: 1;
      display: flex;
      padding: 15px;
      gap: 15px;
      overflow: hidden;
    }

    #video-section {
      flex: 3;
      position: relative;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #firework-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }

    #comment-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    #sidebar {
      flex: 1;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      background: rgba(20, 20, 20, 0.8);
      border-radius: 16px;
      border: 1px solid var(--glass);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 15px;
      background: var(--glass);
      border-bottom: 1px solid var(--glass);
      font-weight: bold;
      color: var(--pink);
    }

    #log-list {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 10px;
    }

    .log-item {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid var(--pink);
    }

    .log-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }

    .log-content {
      font-size: 14px;
      line-height: 1.4;
      word-break: break-all;
    }

    footer {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      border-top: 1px solid var(--glass);
    }

    .input-group {
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.07);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      width: 80%;
      max-width: 700px;
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      outline: none;
    }

    button {
      background: var(--pink);
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ff4d94;
    }

    .floating-comment {
      position: absolute;
      color: #fff;
      font-weight: bold;
      font-size: 1.8vw;
      text-shadow: 0 0 10px var(--pink), 0 0 20px rgba(0, 0, 0, 0.8);
      white-space: nowrap;
      animation: floatUp 5s forwards linear;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(110vh);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🌸 AI Spring FES 2026 - Live (TEST MODE)</div>
  </header>
  <main>
    <div id="video-section">
      <div id="player"></div>
      <canvas id="firework-canvas"></canvas>
      <div id="comment-layer"></div>
    </div>
    <div id="sidebar">
      <div class="sidebar-header">LIVE CHAT</div>
      <div id="log-list"></div>
    </div>
  </main>
  <footer>
    <div class="input-group">
      <input type="text" id="comment-input" placeholder="メッセージを入力して打ち上げよう！" maxlength="40">
      <button id="send-btn">打ち上げる！ 🚀</button>
    </div>
  </footer>

  <script>
    // 【テスト用】即座に見れる動画ID
    const VIDEO_1 = 'dQw4w9WgXcQ'; // Rick Astley
    const VIDEO_2 = '9bZkp7q19f0'; // Gangnam Style

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    let player;
    let currentVideoId = "";

    function onYouTubeIframeAPIReady() {
      const initialVideo = getAppropriateVideoId();
      currentVideoId = initialVideo;
      player = new YT.Player('player', {
        videoId: initialVideo,
        playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0, 'modestbranding': 1 },
        events: { 'onReady': (event) => event.target.playVideo() }
      });
      setInterval(autoSwitchVideo, 30000);
    }

    function getAppropriateVideoId() {
      // テスト用に日付判定を外し、時間だけでVIDEO_1か2を出すようにします
      const now = new Date();
      const time = now.getHours() * 100 + now.getMinutes();
      if (time >= 1859) return VIDEO_2;
      return VIDEO_1;
    }

    function autoSwitchVideo() {
      const targetId = getAppropriateVideoId();
      if (currentVideoId !== targetId) {
        currentVideoId = targetId;
        player.loadVideoById(targetId);
      }
    }

    const socket = io('https://api.ai-event-collection.jp');
    function emitComment() {
      const input = document.getElementById('comment-input');
      const text = input.value.trim();
      if (text) {
        socket.emit('send-comment', { text: text });
        input.value = '';
      }
    }
    document.getElementById('send-btn').onclick = emitComment;
    document.getElementById('comment-input').onkeypress = (e) => { if (e.key === 'Enter') emitComment(); };

    // 履歴読み込み
    socket.on('load-history', (history) => {
      const list = document.getElementById('log-list');
      list.innerHTML = '';
      history.forEach(data => addLogItem(data));
    });

    socket.on('new-comment', (data) => {
      createFloatingComment(data.text);
      addLogItem(data);
      launchFirework();
      setTimeout(launchFirework, 400);
      setTimeout(launchFirework, 800);
    });

    function addLogItem(data) {
      const list = document.getElementById('log-list');
      const item = document.createElement('div');
      item.className = 'log-item';
      const displayTime = data.time || "00:00";
      const shortId = data.user ? data.user.substring(0, 4) : "User";
      item.innerHTML = `<div class="log-meta"><span>ID: ${shortId}</span><span>${displayTime}</span></div><div class="log-content">${data.text}</div>`;
      list.prepend(item);
      if (list.children.length > 100) list.lastChild.remove();
    }

    function createFloatingComment(text) {
      const el = document.createElement('div');
      el.className = 'floating-comment';
      el.innerText = text;
      el.style.left = (Math.random() * 60 + 20) + '%';
      const layer = document.getElementById('comment-layer');
      if (layer) layer.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }

    const canvas = document.getElementById('firework-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.onresize = resize; resize();

    function launchFirework() {
      const x = Math.random() * canvas.width;
      const y = canvas.height * (Math.random() * 0.4 + 0.2);
      const hue = 330 + Math.random() * 40;
      const color = `hsl(${hue}, 100%, 75%)`;
      const glowColor = `hsl(${hue}, 100%, 60%)`;
      for (let i = 0; i < 60; i++) {
        particles.push({ x, y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 1.6, color, glowColor });
      }
    }

    function animate() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.008;
        ctx.shadowBlur = 15; ctx.shadowColor = p.glowColor;
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
      });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>

</html>
